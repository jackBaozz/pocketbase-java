name: CI Release Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  jvm-tests:
    name: JVM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run Maven Tests
        run: mvn -B test

  ui-build:
    name: UI Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build UI
        run: |
          cd UI
          npm ci
          npm run build
          git diff --exit-code -- ../src/main/resources/pocketbase-admin

  native-build-and-smoke:
    name: Native Build & Smoke
    runs-on: ubuntu-latest
    needs: [jvm-tests, ui-build]
    steps:
      - uses: actions/checkout@v4
      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build Native Image
        run: mvn -Pnative -DskipTests package
      - name: Native Smoke Test
        run: |
          ./target/pocketbase-java --port=8091 &
          PID=$!
          sleep 5
          curl -f http://localhost:8091/api/health || (kill $PID && exit 1)
          kill $PID
